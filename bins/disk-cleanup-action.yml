name: Disk cleanup
description: Clean up disk space by removing unnecessary files
runs:
  using: 'composite'
  steps:
    - name: Clean up unnecessary files
      shell: bash
      run: |
        # Remove Java JDKs
        echo "Remove Java JDKs"
        echo "# sudo rm -rf /usr/lib/jvm"
        sudo rm -rf /usr/lib/jvm

        # Remove .NET SDKs
        echo "Remove .NET SDKs"
        echo "# sudo rm -rf /usr/share/dotnet"
        sudo rm -rf /usr/share/dotnet

        # Remove Swift toolchain
        echo "Remove Swift toolchain"
        echo "# sudo rm -rf /usr/share/swift"
        sudo rm -rf /usr/share/swift

        # Remove Haskell (GHC)
        echo "Remove Haskell (GHC)"
        echo "# sudo rm -rf /usr/local/.ghcup"
        sudo rm -rf /usr/local/.ghcup

        # Remove Julia
        echo "Remove Julia"
        echo "# sudo rm -rf /usr/local/julia*"
        sudo rm -rf /usr/local/julia*

        # Remove Chromium (optional if not using for browser tests)
        echo "Remove Chromium (optional if not using for browser tests)"
        echo "# sudo rm -rf /usr/local/share/chromium"
        sudo rm -rf /usr/local/share/chromium

        # Remove Microsoft/Edge and Google Chrome builds
        echo "Remove Microsoft/Edge and Google Chrome builds"
        echo "# sudo rm -rf /opt/microsoft /opt/google"
        sudo rm -rf /opt/microsoft /opt/google

        # Remove Azure CLI
        echo "Remove Azure CLI"
        echo "# sudo rm -rf /opt/az"
        sudo rm -rf /opt/az

        # Remove PowerShell
        echo "Remove PowerShell"
        echo "# sudo rm -rf /usr/local/share/powershell"
        sudo rm -rf /usr/local/share/powershell

        # Remove toolcaches
        echo "Remove toolcaches"
        echo "# sudo rm -rf /opt/hostedtoolcache"
        sudo rm -rf /opt/hostedtoolcache
