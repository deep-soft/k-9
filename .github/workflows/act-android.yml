  workflow_dispatch:

env:
  PRG_NAME: "k9mail"
  PRG_VERSION: "v6.704"
  TAG_NAME: "k9mail"
  TAG_VERSION: "v6.704"
  TAG_BUILD: "-b"
  TAG_REF: "0000000"
  PRG_TYPE: "full"
  PRG_TYPE_FULL: "full"
  PRG_TYPE_FOSS: "foss"
  ANDROID_SIGNING_KEY: '${{ secrets.ANDROID_SIGNING_KEY }}'
  #  signingKeyBase64: ${{ secrets.ANDROID_SIGNING_KEY }}
  #  alias: ${{ secrets.ANDROID_ALIAS }}
  #  keyStorePassword: ${{ secrets.ANDROID_KEY_STORE_PASSWORD }}
  #  keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}  

jobs:
  build-common:
    name: Build common code
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout the repo
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 1

      - name: Show disk usage
        uses: ./.github/actions/disk-usage

# change cleanup disk script (add echo)
      - name: pre cleanup disk
        shell: bash
        run: |
          cp bins/disk-cleanup-action.yml .github/actions/disk-cleanup/action.yml
      - name: Cleanup disk
        uses: ./.github/actions/disk-cleanup

      - name: Show disk usage
        uses: ./.github/actions/disk-usage

      - name: Setup Gradle environment
        uses: ./.github/actions/setup-gradle
        with:
          write-cache: ${{ github.ref == 'refs/heads/main' }}

      - name: Prime configuration and dependency cache
        run: ./gradlew --no-daemon help

      - name: Assemble common
        run: ./gradlew :app-common:assemble

      - name: Show disk usage
        uses: ./.github/actions/disk-usage

